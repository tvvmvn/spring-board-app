<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <style>
    /* 로그인 페이지와 패밀리 룩을 맞춘 모던 CSS */
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .join-container { background-color: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(149, 157, 165, 0.2); width: 100%; max-width: 450px; box-sizing: border-box; }
    h2 { text-align: center; color: #2c3e50; margin-bottom: 32px; font-weight: 700; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #34495e; font-size: 14px; font-weight: 600; }
    .form-control { width: 100%; padding: 12px 16px; border: 1px solid #dcdde1; border-radius: 8px; font-size: 15px; box-sizing: border-box; transition: 0.3s; }
    .form-control:focus { border-color: #2ecc71; outline: none; box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.15); }
    .field-error { color: #e74c3c; font-size: 13px; margin-top: 6px; margin-bottom: 0; font-weight: 500; }
    .global-error { background-color: #fff5f5; color: #e74c3c; padding: 12px; border-radius: 8px; border: 1px solid #feb2b2; margin-bottom: 20px; font-size: 13px; text-align: center; }
    .btn-join { width: 100%; padding: 14px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.2s; }
    .btn-join:hover { background-color: #27ae60; }
    .join-footer { margin-top: 24px; text-align: center; font-size: 13px; color: #7f8c8d; }
    .join-footer a { color: #3498db; text-decoration: none; font-weight: 600; }
  </style>
</head>

<body>
  <div class="join-container">
    <h2>👤 회원가입</h2>

    <div th:if="${errorMessage}" class="global-error" th:text="${errorMessage}">
      서버 검증 에러 메시지
    </div>
    
    <form th:action="@{/member/join}" th:object="${memberForm}" method="post">
      
      <div class="form-group">
        <label>아이디</label>
        <input type="text" th:field="*{username}" class="form-control" placeholder="사용할 아이디를 입력하세요">
        <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="field-error"></p>
      </div>
      
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" th:field="*{password}" class="form-control" placeholder="비밀번호를 입력하세요">
        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="field-error"></p>
      </div>
      
      <div class="form-group">
        <label>비밀번호 확인</label>
        <input type="password" th:field="*{passwordConfirm}" class="form-control" placeholder="비밀번호를 한 번 더 입력하세요">
        <p th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}" class="field-error"></p>
      </div>
      
      <button type="submit" class="btn-join">가입하기</button>
      
      <div class="join-footer">
        이미 계정이 있으신가요? <a th:href="@{/member/login}">로그인하기</a>
      </div>
    </form>
  </div>
</body>
</html>
