<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>⚠️ 시스템 오류 안내</title>
  <style>
    body { text-align: center; padding-top: 80px; font-family: 'Malgun Gothic', sans-serif; background: #f8f9fa; }
    .error-container { border: 1px solid #e9ecef; display: inline-block; padding: 40px; border-radius: 12px; background: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 500px; }
    h1 { margin-top: 0; font-size: 28px; }
    .status-code { font-size: 14px; color: #adb5bd; font-weight: bold; margin-bottom: 10px; }
    .msg-box { font-size: 16px; color: #495057; background: #f1f3f5; padding: 15px; border-radius: 6px; margin: 20px 0; line-height: 1.5; }
    .btn-home { inline-block; background: #228be6; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; font-weight: bold; }
    .btn-home:hover { background: #1c7ed6; }
  </style>
</head>
<body>

  <div class="error-container">
    <div class="status-code" th:text="'HTTP STATUS CODE : ' + ${status}">HTTP STATUS CODE : 400</div>

    <div th:if="${status == 400}">
      <h1 style="color: #e03131;">🛑 잘못된 요청입니다.</h1>
    </div>

    <div th:if="${status == 500}">
      <h1 style="color: #f03e3e;">🔥 시스템 고장이 발생했습니다.</h1>
    </div>

    <div class="msg-box">
      <strong th:text="${message}">여기에 구체적인 안내 메시지가 출력됩니다.</strong>
    </div>

    <br>
    <a th:href="@{/board/list}" class="btn-home">🏠 게시판 목록으로 돌아가기</a>
  </div>

</body>
</html>
