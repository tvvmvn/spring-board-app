<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>글수정</title>
</head>

<body>
  <h2>✏️ 글 수정</h2>
  
  <!-- Error messages -->
  <div th:if="${errorMessage}" style="color: red; font-weight: bold;" th:text="${errorMessage}"></div>
  
  <!-- Create form -->
  <form th:action="@{/board/edit(id=${boardId})}" th:object="${boardForm}" method="post">
    <div>제목: <input type="text" th:field="*{title}" required></div><br>
    <div>내용: <textarea th:field="*{content}" rows="5" required></textarea></div><br>
    <button type="submit">수정완료</button> 
    <a th:href="@{/board/list}">취소</a>
  </form>
</body>

</html>
