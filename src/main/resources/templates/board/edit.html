<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>글수정</title>
</head>

<body>
  <h2>✏️ 글 수정</h2>
  
  <!-- Error messages -->
  <div th:if="${errorMessage}" style="color: red; font-weight: bold;" th:text="${errorMessage}"></div>
  
  <!-- Create form -->
  <form th:action="@{/board/edit(id=${boardId})}" th:object="${boardForm}" method="post">
    <div style="margin-bottom: 15px; padding: 10px; background-color: #f0f0f0; border-radius: 5px;">
      <strong>현재 수정 중인 게시물 번호: </strong>
      <span th:text="${boardId}">0</span>
    </div>
    <div>
      제목: <input type="text" th:field="*{title}" style="width: 300px;">
      <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color: red; font-size: 13px;"></p>
    </div>
    
    <div>
      내용: <br>
      <textarea th:field="*{content}" rows="10" cols="40"></textarea>
      <p th:if="${#fields.hasErrors('content')}" th:errors="*{content}" style="color: red; font-size: 13px;"></p>
    </div>
    
    <br>
    <button type="submit">수정하기</button>
    <a th:href="@{/board/list}">취소</a>
  </form>
</body>

</html>
