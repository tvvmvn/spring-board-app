<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>글쓰기</title>
</head>

<body>
  <h2>✍️ 글쓰기</h2>

  <!-- Error messages -->
  <div th:if="${errorMessage}" style="color: red; font-weight: bold;" th:text="${errorMessage}"></div>
  
  <!-- Create form -->
  <form th:action="@{/board/write}" th:object="${boardForm}" method="post">
    <div>
      제목: <input type="text" th:field="*{title}" style="width: 300px;">
      <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color: red; font-size: 13px;"></p>
    </div>
    
    <div>
      내용: <br>
      <textarea th:field="*{content}" rows="10" cols="40"></textarea>
      <p th:if="${#fields.hasErrors('content')}" th:errors="*{content}" style="color: red; font-size: 13px;"></p>
    </div>
    
    <br>
    <button type="submit">등록하기</button>
    <a th:href="@{/board/list}">취소</a>
  </form>
</body>

</html>
