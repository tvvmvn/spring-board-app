<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>글수정</title>
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fa; padding: 40px; display: flex; justify-content: center; }
    .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 600px; }
    h2 { color: #2c3e50; margin-bottom: 25px; border-bottom: 2px solid #f1c40f; padding-bottom: 10px; }
    
    /* 현재 수정 중인 게시물 번호 안내 박스 */
    .info-box { margin-bottom: 25px; padding: 15px; background-color: #fcf8e3; border: 1px solid #faebcc; border-radius: 6px; color: #8a6d3b; font-size: 14px; }
    
    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #495057; }
    
    .form-control { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; }
    .textarea-control { height: 200px; resize: none; }
    .form-control:focus { border-color: #f1c40f; outline: none; box-shadow: 0 0 0 3px rgba(241, 196, 15, 0.1); }
    
    .field-error { color: #e74c3c; font-size: 13px; margin-top: 5px; }
    .btn-group { display: flex; gap: 10px; margin-top: 20px; }
    .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .btn-submit { background-color: #f1c40f; color: white; flex-grow: 2; }
    .btn-cancel { background-color: #95a5a6; color: white; flex-grow: 1; text-decoration: none; text-align: center; }
  </style>
</head>

<body>
  <div class="card">
    <h2>✏️ 글 수정</h2>
    
    <div th:if="${errorMessage}" class="field-error" style="font-weight: bold; margin-bottom: 15px;" th:text="${errorMessage}"></div>
    
    <div class="info-box">
      <strong>게시물 ID: </strong>
      <span th:text="${postId}" style="font-weight: bold;">0</span>
    </div>

    <form th:action="@{/posts/edit(id=${postId})}" th:object="${postForm}" method="post">
      <div class="form-group">
        <label>제목</label>
        <input type="text" th:field="*{title}" class="form-control" placeholder="수정할 제목을 입력하세요">
        <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="field-error"></p>
      </div>
      
      <div class="form-group">
        <label>내용</label>
        <textarea th:field="*{content}" class="form-control textarea-control" placeholder="수정할 내용을 입력하세요"></textarea>
        <p th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="field-error"></p>
      </div>
      
      <div class="btn-group">
        <button type="submit" class="btn btn-submit">수정하기</button>
        <a th:href="@{/posts}" class="btn btn-cancel">취소</a>
      </div>
    </form>
  </div>
</body>
</html>
