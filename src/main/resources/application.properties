# 앱 이름
spring.application.name=boardapp


# MySQL DB 설정
spring.datasource.url=jdbc:mysql://localhost:3306/boardapp_db?serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# MyBatis 세팅 - mapper.xml 경로를 지정합니다
mybatis.mapper-locations=classpath:mappers/**/*.xml
# DB의 스네이크 케이스를 카멜케이스로 변환합니다.
mybatis.configuration.map-underscore-to-camel-case=true


# 타임리프 템플릿 캐싱 해제 (운영 환경에서는 true, 개발/강의 환경에서는 false)
spring.thymeleaf.cache=false